<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Objex - Iniciar Sesión</title>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body>

    <header>
        <nav>
            <fieldset class="navegacion">
                <h1>Objex</h1>
                <a href="../../index.html">Inicio</a>
                <a href="../publicaciones/publicaciones.html">Publicaciones</a>
            </fieldset>

        </nav>
    </header>
    <br>

    <main>
        <section class="contenedor-login">
            <section class="card-login">
                <h2>Inicio de sesión</h2>
                <p>Accede para publicar, contactar usuarios y gestionar tus objetos.</p>

                <form method="get" action="../inicio/inicio-registrado.html">

                    <label for="correo">Correo institucional</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@espe.edu.ec">

                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña"
                        minlength="8" maxlength="16">

                    <button type="submit">Iniciar sesión</button>

                    <p class="registro-texto">
                        ¿No tienes cuenta?
                        <a href="registrarse.html">Registrarse</a>
                    </p>

                </form>
            </section>
        </section>
    </main>
    <br>

    <footer>
        <section class="pie">
            <h3>Objex</h3>
            <a id="aviso">Aviso de privacidad</a>
            <a>Términos y condiciones</a>
            <a>Soporte técnico</a>
        </section>
    </footer>

</body>

</html>
