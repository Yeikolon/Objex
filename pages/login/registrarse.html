<!DOCTYPE html>
<html lang="es">

<head>

    <title>Objex - Registro</title>
    <meta charset="UTF-8">

    <link href="../../css/styles.css" rel="stylesheet">

    <link rel="icon"
        href="../../src/icons/lupa.png"
        type="image/x-icon">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <header>

        <nav>

            <fieldset class="navegacion">

                <h1>Objex</h1>

                <a href="../../index.html">
                    INICIO
                </a>

                <a href="../publicaciones/publicaciones.html">
                    PUBLICACIONES
                </a>

            </fieldset>

        </nav>

    </header>

    <br>

    <main>

        <section class="contenedor-login">

            <section class="card-login">

                <h2>Registro</h2>

                <p>
                    Crea una cuenta para publicar y contactar dentro de Objex.
                </p>

                <form method="post" action="../inicio/inicio-registrado.html">

                    <label for="nombre">
                        Nombres
                    </label>

                    <input type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Ingrese sus nombres">

                    <label for="apellido">
                        Apellidos
                    </label>

                    <input type="text"
                        id="apellido"
                        name="apellido"
                        placeholder="Ingrese sus apellidos">

                    <label for="cedula">
                        Cédula
                    </label>

                    <input type="text"
                        id="cedula"
                        name="cedula"
                        placeholder="Ingrese su cédula"
                        minlength="10"
                        maxlength="10">

                    <label for="genero">
                        Género
                    </label>

                    <select id="genero" name="genero">

                        <option value="masculino">
                            Masculino
                        </option>

                        <option value="femenino">
                            Femenino
                        </option>

                    </select>

                    <label for="correo">
                        Correo institucional
                    </label>

                    <input type="email"
                        id="correo"
                        name="correo"
                        placeholder="ejemplo@espe.edu.ec">

                    <label for="contrasena">
                        Contraseña
                    </label>

                    <input type="password"
                        id="contrasena"
                        name="contrasena"
                        placeholder="Ingrese su contraseña"
                        minlength="8"
                        maxlength="16">

                    <button type="submit">
                        Crear cuenta
                    </button>

                    <p class="registro-texto">

                        ¿Ya tienes cuenta?

                        <a href="../login/iniciar-sesion.html">
                            Iniciar sesión
                        </a>

                    </p>

                </form>

            </section>

        </section>

    </main>

    <br>

    <footer>

        <section class="pie">

            <h3>Objex</h3>

            <a id="aviso">
                Aviso de privacidad
            </a>

            <a>
                Términos y condiciones
            </a>

            <a>
                Soporte técnico
            </a>

        </section>

    </footer>

</body>

</html>
